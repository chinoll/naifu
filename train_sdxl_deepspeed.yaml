name: test-run
target: modules.train_sdxl.setup

trainer:
  model_path: /home/zetyun/chenkin-noob/ouput/v0.2/ChenkinNoob-XL-V0.2.safetensors
  batch_size: 560
  seed: 1138
  wandb_id: ""
  use_xformers: true
  accumulate_grad_batches: 1
  gradient_clip_val: 0.0

  save_format: safetensors
  checkpoint_dir: checkpoint
  checkpoint_freq: 1
  checkpoint_steps: -1
  save_weights_only: true
  max_epochs: 60
  max_steps: -1

advanced:
  vae_encode_batch_size: -1 # same as batch_size
  train_text_encoder_1: false
  train_text_encoder_2: false
  text_encoder_1_lr: 3e-6
  text_encoder_2_lr: 3e-6
  offset_noise: true
  offset_noise_val: 0.0375
  min_snr: true
  min_snr_val: 5
  timestep_start: 0
  timestep_end: 1000
  v_parameterization: false
  zero_terminal_snr: false
  
lightning:
  accelerator: gpu
  devices: -1
  strategy: common.deepspeed._sdxl_strategy
  precision: bf16

